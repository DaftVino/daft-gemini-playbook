name: validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  prompts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate prompt files
        run: node scripts/validate-prompts.mjs

      - name: Check prompts/index.md is up to date
        run: |
          node scripts/validate-prompts.mjs --write-index
          if ! git diff --quiet -- prompts/index.md; then
            echo "::error::prompts/index.md is stale. Run: node scripts/validate-prompts.mjs --write-index"
            git --no-pager diff -- prompts/index.md
            exit 1
          fi
